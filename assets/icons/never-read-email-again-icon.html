<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Never Read Email Again - Icon</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: #0a0b14;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    padding: 80px;
  }
  .icon-area {
    position: relative;
    width: 420px;
    height: 320px;
    margin-bottom: 60px;
  }
  .envelope-body {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 360px;
    height: 220px;
    border: 3px solid transparent;
    border-radius: 20px;
    background: linear-gradient(#0a0b14, #0a0b14) padding-box,
                linear-gradient(135deg, #00d4ff, #a855f7, #ec4899) border-box;
    box-shadow: 0 0 40px rgba(0, 212, 255, 0.15), 0 0 80px rgba(168, 85, 247, 0.08);
  }
  .envelope-flap-border {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 180px solid transparent;
    border-right: 180px solid transparent;
    border-top: 112px solid #00d4ff;
    filter: drop-shadow(0 0 15px rgba(0, 212, 255, 0.4));
    z-index: 2;
  }
  .envelope-flap-inner {
    position: absolute;
    top: 3px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 176px solid transparent;
    border-right: 176px solid transparent;
    border-top: 109px solid #0a0b14;
    z-index: 3;
  }
  .letter {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 260px;
    height: 140px;
    border: 3px solid transparent;
    border-radius: 14px 14px 0 0;
    background: linear-gradient(#0a0b14, #0a0b14) padding-box,
                linear-gradient(135deg, #a855f7, #00d4ff) border-box;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    padding: 20px 28px;
    gap: 12px;
  }
  .letter-line {
    height: 4px;
    border-radius: 2px;
    background: linear-gradient(90deg, #00d4ff, #a855f7);
    opacity: 0.5;
  }
  .letter-line:nth-child(1) { width: 70%; }
  .letter-line:nth-child(2) { width: 90%; }
  .letter-line:nth-child(3) { width: 55%; }
  .bolt {
    position: absolute;
    top: 45px;
    right: 55px;
    z-index: 5;
    width: 50px;
    height: 70px;
  }
  .bolt svg {
    width: 50px;
    height: 70px;
    filter: drop-shadow(0 0 10px rgba(0, 212, 255, 0.6));
  }
  .dots {
    display: flex;
    gap: 8px;
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 4;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #00d4ff;
    opacity: 0.6;
  }
  .dot:nth-child(2) { background: #a855f7; }
  .dot:nth-child(3) { background: #ec4899; }
  .dot:nth-child(4) { background: #00d4ff; }
  .label {
    font-size: 42px;
    font-weight: 700;
    letter-spacing: 6px;
    text-transform: uppercase;
    text-align: center;
    background: linear-gradient(90deg, #00d4ff, #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="icon-area">
      <div class="letter">
        <div class="letter-line"></div>
        <div class="letter-line"></div>
        <div class="letter-line"></div>
      </div>
      <div class="envelope-flap-border"></div>
      <div class="envelope-flap-inner"></div>
      <div class="envelope-body">
        <div class="dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>
      <div class="bolt">
        <svg viewBox="0 0 40 60" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M24 2L8 28H18L14 58L34 26H22L24 2Z" fill="url(#boltGrad)" stroke="url(#boltStroke)" stroke-width="1.5"/>
          <defs>
            <linearGradient id="boltGrad" x1="8" y1="2" x2="34" y2="58" gradientUnits="userSpaceOnUse">
              <stop stop-color="#00d4ff" stop-opacity="0.3"/>
              <stop offset="1" stop-color="#a855f7" stop-opacity="0.3"/>
            </linearGradient>
            <linearGradient id="boltStroke" x1="8" y1="2" x2="34" y2="58" gradientUnits="userSpaceOnUse">
              <stop stop-color="#00d4ff"/>
              <stop offset="1" stop-color="#a855f7"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
    </div>
    <div class="label">Email Assistant</div>
  </div>
</body>
</html>

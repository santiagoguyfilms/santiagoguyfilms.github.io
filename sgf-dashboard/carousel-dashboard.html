<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#0a0b14">
<title>Content Dashboard — SGF</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,sans-serif;background:#0a0b14;color:#fff;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.ambient{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse at 20% 10%,rgba(0,212,255,.05) 0%,transparent 50%),radial-gradient(ellipse at 80% 90%,rgba(168,85,247,.03) 0%,transparent 50%)}
.c{max-width:960px;margin:0 auto;padding:40px 20px 80px;position:relative;z-index:1}
@media(max-width:640px){.c{padding:24px 16px 60px}}
.bl{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bl span:first-child{font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#00d4ff}
.bl .d{width:4px;height:4px;border-radius:50%;background:#4b5072}
.bl span:last-child{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#4b5072}
h1{font-size:clamp(2rem,5vw,3rem);font-weight:900;letter-spacing:-2px;line-height:1.05;background:linear-gradient(135deg,#00d4ff,#a855f7,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{font-size:14px;color:#4b5072;margin-top:6px;font-weight:500}
.back{display:inline-flex;align-items:center;gap:6px;margin-bottom:24px;font-size:12px;font-weight:600;color:#4b5072;text-decoration:none;letter-spacing:.5px;transition:color .2s}
.back:hover{color:#00d4ff}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:28px 0}
.st{background:#111220;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:14px 16px;text-align:center}
.st-l{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#4b5072;margin-bottom:4px}
.st-v{font-size:22px;font-weight:900;letter-spacing:-1px}
.grid{display:grid;grid-template-columns:1fr;gap:14px;margin-top:24px}
@media(min-width:640px){.grid{grid-template-columns:1fr 1fr}}

/* Brief Cards */
.brief{background:#111220;border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:22px 24px;animation:fu .5s ease both;transition:border-color .25s,transform .25s;display:flex;flex-direction:column}
.brief:hover{border-color:rgba(0,212,255,.2);transform:translateY(-2px)}
.brief-num{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#4b5072;margin-bottom:8px}
.brief-title{font-size:16px;font-weight:800;color:#fff;letter-spacing:-.5px;margin-bottom:4px}
.brief-hook{font-size:13px;color:#9ca3af;line-height:1.5;margin-bottom:12px}
.brief-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tag{padding:3px 10px;border-radius:100px;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase}
.tag-src{color:#00d4ff;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.2)}
.tag-vol{color:#a855f7;background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.2)}
.tag-type{color:#ec4899;background:rgba(236,72,153,.1);border:1px solid rgba(236,72,153,.2)}
.tag-ready{color:#34d399;background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.2)}

/* Divider */
.brief-divider{height:1px;background:rgba(255,255,255,.06);margin:16px 0}

/* Action Buttons Row */
.brief-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:auto}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;font-size:12px;font-weight:700;letter-spacing:.3px;cursor:pointer;border:none;transition:all .25s ease;text-decoration:none;white-space:nowrap}
.btn:hover{transform:translateY(-1px)}
.btn-preview{background:rgba(168,85,247,.12);color:#a855f7;border:1px solid rgba(168,85,247,.25)}
.btn-preview:hover{background:rgba(168,85,247,.2);border-color:rgba(168,85,247,.4);box-shadow:0 4px 16px rgba(168,85,247,.15)}
.btn-payment{background:rgba(52,211,153,.12);color:#34d399;border:1px solid rgba(52,211,153,.25)}
.btn-payment:hover{background:rgba(52,211,153,.2);border-color:rgba(52,211,153,.4);box-shadow:0 4px 16px rgba(52,211,153,.15)}
.btn-payment.has-link{background:rgba(52,211,153,.2);border-color:rgba(52,211,153,.4)}

/* Run Carousel CTA */
.btn-run{background:#00d4ff;color:#0a0b14;padding:10px 20px;border:none;font-size:12px;font-weight:800;letter-spacing:.5px;box-shadow:0 4px 20px rgba(0,212,255,.25);width:100%;justify-content:center;margin-top:10px}
.btn-run:hover{box-shadow:0 6px 28px rgba(0,212,255,.35);transform:translateY(-2px)}

/* Mockup Preview Panel */
.mockup-panel{display:none;margin-top:14px;padding:16px;background:#0a0b14;border:1px solid rgba(168,85,247,.2);border-radius:12px;animation:slideDown .3s ease}
.mockup-panel.open{display:block}
.mockup-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#a855f7;margin-bottom:10px}
.mockup-slides{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px}
.ms{flex:0 0 130px;height:130px;background:#0a0b14;border:1px solid rgba(255,255,255,.08);border-radius:8px;position:relative;overflow:hidden;font-family:'Inter',sans-serif}
.ms-bar{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#00d4ff,#a855f7,#ec4899)}
.ms-glow{position:absolute;inset:0;pointer-events:none;opacity:.6}
.ms-brand{position:absolute;bottom:5px;left:8px;font-size:5px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#2d3050}
.ms-num{position:absolute;bottom:5px;right:7px;font-size:5.5px;font-weight:700;letter-spacing:1px;color:#2d3050}
.ms-body{position:relative;padding:14px 10px 16px;height:100%;display:flex;flex-direction:column;justify-content:center}
/* Slide 1 - Hook */
.ms1 .ms-badge{display:inline-block;background:#00d4ff;color:#0a0b14;font-size:5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:3px;margin-bottom:6px;width:fit-content}
.ms1 .ms-h1{font-size:11px;font-weight:900;line-height:1.05;letter-spacing:-.5px;color:#fff;margin-bottom:4px}
.ms1 .ms-h1 em{font-style:normal;background:linear-gradient(135deg,#00d4ff,#a855f7,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ms1 .ms-sub{font-size:5.5px;color:#9ca3af;line-height:1.4}
/* Slide 2 - Problem */
.ms2 .ms-label{font-size:5.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#00d4ff;margin-bottom:3px}
.ms2 .ms-h1{font-size:11px;font-weight:900;letter-spacing:-.5px;color:#fff;line-height:1.0;margin-bottom:6px}
.ms2 .ms-problems{display:flex;flex-direction:column;gap:3px}
.ms2 .ms-pi{display:flex;align-items:center;gap:5px;background:#111220;border:1px solid rgba(255,255,255,.07);border-radius:5px;padding:4px 6px}
.ms2 .ms-pn{font-size:6px;font-weight:900;color:#2d3050;flex-shrink:0}
.ms2 .ms-pt{font-size:5.5px;font-weight:600;color:#e5e7eb;line-height:1.2}
/* Slide 3 - Solution */
.ms3 .ms-label{font-size:5.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#00d4ff;margin-bottom:3px}
.ms3 .ms-h1{font-size:10px;font-weight:900;letter-spacing:-.5px;line-height:1.0;margin-bottom:3px;background:linear-gradient(135deg,#00d4ff,#a855f7,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ms3 .ms-sub{font-size:5px;color:#9ca3af;margin-bottom:5px}
.ms3 .ms-dlist{display:flex;flex-direction:column;gap:3px}
.ms3 .ms-di{display:flex;align-items:center;gap:5px;background:#111220;border:1px solid rgba(255,255,255,.07);border-radius:5px;padding:4px 6px}
.ms3 .ms-dicon{font-size:7px;color:#00d4ff;font-weight:900;width:10px;flex-shrink:0;text-align:center}
.ms3 .ms-dt{font-size:5.5px;font-weight:600;color:#e5e7eb}
/* Slide 4 - Offer */
.ms4 .ms-price{font-size:28px;font-weight:900;color:#00d4ff;letter-spacing:-2px;line-height:1;text-shadow:0 0 12px rgba(0,212,255,.25);margin-bottom:2px}
.ms4 .ms-plabel{font-size:5.5px;font-weight:700;color:#fff;letter-spacing:.5px;margin-bottom:5px}
.ms4 .ms-checks{display:flex;flex-direction:column;gap:2px}
.ms4 .ms-ci{display:flex;align-items:center;gap:4px;font-size:5px;color:#d1d5db}
.ms4 .ms-ck{color:#34d399;font-weight:800;font-size:5.5px}
/* Slide 5 - CTA */
.ms5 .ms-body{align-items:center;text-align:center}
.ms5 .ms-top{font-size:5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#4b5072;margin-bottom:4px}
.ms5 .ms-h1{font-size:9px;font-weight:900;color:#fff;letter-spacing:-.3px;margin-bottom:3px}
.ms5 .ms-bigp{font-size:22px;font-weight:900;letter-spacing:-1.5px;line-height:1;margin-bottom:5px;background:linear-gradient(135deg,#00d4ff,#a855f7,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ms5 .ms-cta{background:#00d4ff;color:#0a0b14;font-size:5.5px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:4px 12px;border-radius:4px;box-shadow:0 2px 8px rgba(0,212,255,.25)}

/* Payment Link Input */
.payment-panel{display:none;margin-top:10px;animation:slideDown .3s ease}
.payment-panel.open{display:block}
.payment-input-row{display:flex;gap:8px}
.payment-input{flex:1;background:#0a0b14;border:1px solid rgba(52,211,153,.25);border-radius:8px;padding:8px 12px;color:#fff;font-family:'Inter',sans-serif;font-size:12px;outline:none;transition:border-color .2s}
.payment-input::placeholder{color:#4b5072}
.payment-input:focus{border-color:rgba(52,211,153,.5)}
.payment-save{background:#34d399;color:#0a0b14;border:none;border-radius:8px;padding:8px 14px;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.payment-save:hover{box-shadow:0 4px 12px rgba(52,211,153,.3)}
.payment-saved{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.2);border-radius:8px}
.payment-saved-link{font-size:11px;color:#34d399;word-break:break-all;flex:1}
.payment-edit{background:none;border:1px solid rgba(52,211,153,.25);color:#34d399;border-radius:6px;padding:4px 10px;font-size:10px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.payment-edit:hover{background:rgba(52,211,153,.1)}
.payment-remove{background:none;border:1px solid rgba(236,72,153,.25);color:#ec4899;border-radius:6px;padding:4px 10px;font-size:10px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.payment-remove:hover{background:rgba(236,72,153,.1)}

/* Copied Toast */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:#111220;border:1px solid rgba(0,212,255,.3);color:#00d4ff;padding:12px 24px;border-radius:10px;font-size:13px;font-weight:700;opacity:0;transition:all .3s ease;pointer-events:none;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.ft{text-align:center;margin-top:48px;color:#4b5072;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase}
@keyframes fu{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="ambient"></div>
<div class="c">
<a href="./" class="back">&larr; Back to Dashboard</a>
<div class="bl"><span>Santiago Guy Films</span><span class="d"></span><span>Content Pipeline</span></div>
<h1>Pain Point Carousel Pipeline</h1>
<div class="sub">10 data-driven carousel briefs ready to preview and run. Powered by real Google search data.</div>

<div class="stats">
<div class="st"><div class="st-l">Total Briefs</div><div class="st-v" style="color:#00d4ff">10</div></div>
<div class="st"><div class="st-l">Ready to Run</div><div class="st-v" style="color:#34d399">10</div></div>
<div class="st"><div class="st-l">Avg Search Vol</div><div class="st-v" style="color:#a855f7">8.2K</div></div>
<div class="st"><div class="st-l">Format</div><div class="st-v" style="color:#ec4899">5-Slide</div></div>
</div>

<div class="grid" id="briefs-grid"></div>

<div class="ft">Santiago Guy Films &middot; Content Pipeline &middot; 2026</div>
</div>

<div class="toast" id="toast"></div>

<script>
const briefs = [
  { num: "01", title: "Why Your Content Gets Zero Engagement", hook: "You're posting every day and getting nothing back. Here's why.", src: "Google Trends", vol: "12K/mo", type: "Pain Point", slides: ["THE HOOK", "The real problem: you're creating for yourself, not your audience", "3 signs your content strategy is broken", "What high-performing creators do differently", "CTA: Let SGF build content that actually converts"] },
  { num: "02", title: "AI Won't Replace You — But Someone Using AI Will", hook: "The threat isn't the tool. It's the person who learned it first.", src: "Google Search", vol: "9.5K/mo", type: "Fear/Urgency", slides: ["THE HOOK", "AI adoption is accelerating — here's the data", "What your competitors are already automating", "The 3 AI tools every business needs now", "CTA: Get ahead with SGF's AI automation"] },
  { num: "03", title: "Stop Paying Agencies $5K/mo for Templated Work", hook: "That 'custom strategy' they sold you? It's a Canva template.", src: "Google Trends", vol: "7.8K/mo", type: "Contrarian", slides: ["THE HOOK", "How agencies recycle the same playbook for every client", "What $5K/mo actually gets you (vs. what it should)", "The alternative: AI-powered, custom-built systems", "CTA: See what real custom work looks like"] },
  { num: "04", title: "Your Brand Looks Like Everyone Else's", hook: "Same fonts. Same stock photos. Same 'we're passionate about' copy.", src: "Google Search", vol: "6.2K/mo", type: "Pain Point", slides: ["THE HOOK", "The template trap: why most brands look identical", "What actually makes a brand memorable", "Real examples of brands that broke the mold", "CTA: Build a brand people actually remember"] },
  { num: "05", title: "UGC Is Dead (The Way You're Doing It)", hook: "Brands don't want more UGC. They want content that converts.", src: "Google Trends", vol: "11K/mo", type: "Hot Take", slides: ["THE HOOK", "The old UGC model is saturated and ignored", "What brands actually need in 2026", "How conversion-focused content outperforms generic UGC 4:1", "CTA: Create content that sells, not just fills feeds"] },
  { num: "06", title: "Small Businesses Are Bleeding Money on Bad Ads", hook: "You boosted a post for $50 and got 3 likes. Let's fix that.", src: "Google Search", vol: "8.4K/mo", type: "Pain Point", slides: ["THE HOOK", "Why boosting posts is burning your budget", "The difference between boosting and real ad strategy", "3 things to fix before you spend another dollar", "CTA: Let SGF build ads that actually convert"] },
  { num: "07", title: "The Real Reason Your Videos Don't Go Viral", hook: "It's not the algorithm. It's the first 3 seconds.", src: "Google Trends", vol: "14K/mo", type: "Education", slides: ["THE HOOK", "The 3-second rule: hook or lose them forever", "What the algorithm actually rewards (data-backed)", "Framework: the SGF hook formula", "CTA: Get hooks that stop the scroll"] },
  { num: "08", title: "Miami Businesses Are Sleeping on AI Automation", hook: "Your competitor is doing in 10 minutes what takes you all week.", src: "Local Search", vol: "3.2K/mo", type: "Local/Urgency", slides: ["THE HOOK", "Miami's competitive landscape is shifting fast", "What local businesses are automating right now", "Real ROI: time saved, leads generated, revenue gained", "CTA: Automate your business with SGF"] },
  { num: "09", title: "You Don't Need More Followers — You Need Better Content", hook: "10K followers and zero sales? The problem isn't reach.", src: "Google Search", vol: "5.8K/mo", type: "Reframe", slides: ["THE HOOK", "Vanity metrics vs. revenue metrics", "Why 500 engaged followers beat 50K passive ones", "The content framework that turns followers into buyers", "CTA: Build a content engine that drives revenue"] },
  { num: "10", title: "What a $500 Brand Video Actually Gets You in 2026", hook: "Let's break down what you're really paying for — and what you should expect.", src: "Google Trends", vol: "4.1K/mo", type: "Transparency", slides: ["THE HOOK", "The real cost breakdown: gear, editing, strategy", "What cheap video gets you vs. strategic video", "$500 vs $2K vs $5K — what changes at each level", "CTA: Invest smart — see SGF's packages"] }
];

const grid = document.getElementById('briefs-grid');

function renderMockupSlides(b) {
  const hookWords = b.hook.split(' ');
  const hookFirst = hookWords.slice(0, Math.ceil(hookWords.length / 2)).join(' ');
  const hookSecond = hookWords.slice(Math.ceil(hookWords.length / 2)).join(' ');
  const problems = b.slides.slice(1, 4).map(s => s.length > 40 ? s.substring(0, 38) + '\u2026' : s);
  const glows = [
    'radial-gradient(ellipse at 30% 60%,rgba(0,212,255,.07) 0%,transparent 60%)',
    'radial-gradient(ellipse at 70% 30%,rgba(168,85,247,.07) 0%,transparent 60%)',
    'radial-gradient(ellipse at 50% 40%,rgba(168,85,247,.08) 0%,transparent 65%)',
    'radial-gradient(ellipse at 80% 20%,rgba(0,212,255,.08) 0%,transparent 55%)',
    'radial-gradient(ellipse at 50% 50%,rgba(0,212,255,.08) 0%,rgba(168,85,247,.05) 40%,transparent 70%)'
  ];
  const footer = (n) => '<div class="ms-brand">Santiago Guy Films</div><div class="ms-num">0' + n + ' / 05</div>';

  const s1 = '<div class="ms ms1"><div class="ms-bar"></div><div class="ms-glow" style="background:' + glows[0] + '"></div><div class="ms-body"><div class="ms-badge">' + b.type + '</div><div class="ms-h1">' + hookFirst + '<br><em>' + hookSecond + '</em></div><div class="ms-sub">' + b.title.substring(0, 50) + '</div></div>' + footer(1) + '</div>';

  const s2 = '<div class="ms ms2"><div class="ms-bar"></div><div class="ms-glow" style="background:' + glows[1] + '"></div><div class="ms-body"><div class="ms-label">The Problem</div><div class="ms-h1">Sound<br>familiar?</div><div class="ms-problems">' + problems.map(function(p, i) { return '<div class="ms-pi"><span class="ms-pn">0' + (i+1) + '</span><span class="ms-pt">' + p + '</span></div>'; }).join('') + '</div></div>' + footer(2) + '</div>';

  const s3 = '<div class="ms ms3"><div class="ms-bar"></div><div class="ms-glow" style="background:' + glows[2] + '"></div><div class="ms-body"><div class="ms-label">The Solution</div><div class="ms-h1">SGF</div><div class="ms-sub">Content that converts</div><div class="ms-dlist"><div class="ms-di"><span class="ms-dicon">&#9654;</span><span class="ms-dt">Strategy</span></div><div class="ms-di"><span class="ms-dicon">&#9881;</span><span class="ms-dt">AI Systems</span></div><div class="ms-di"><span class="ms-dicon">&#9733;</span><span class="ms-dt">Production</span></div></div></div>' + footer(3) + '</div>';

  const s4 = '<div class="ms ms4"><div class="ms-bar"></div><div class="ms-glow" style="background:' + glows[3] + '"></div><div class="ms-body"><div class="ms-price">$97</div><div class="ms-plabel">Full Package</div><div class="ms-checks"><div class="ms-ci"><span class="ms-ck">&#10003;</span> Custom strategy</div><div class="ms-ci"><span class="ms-ck">&#10003;</span> AI automation</div><div class="ms-ci"><span class="ms-ck">&#10003;</span> Content creation</div><div class="ms-ci"><span class="ms-ck">&#10003;</span> Performance report</div></div></div>' + footer(4) + '</div>';

  const s5 = '<div class="ms ms5"><div class="ms-bar"></div><div class="ms-glow" style="background:' + glows[4] + '"></div><div class="ms-body"><div class="ms-top">Limited Spots Available</div><div class="ms-h1">Get Yours Now</div><div class="ms-bigp">$97</div><div class="ms-cta">Link in Bio &rarr;</div></div>' + footer(5) + '</div>';

  return s1 + s2 + s3 + s4 + s5;
}

briefs.forEach((b, i) => {
  const savedLink = localStorage.getItem('payment_' + b.num) || '';
  const hasLink = savedLink.length > 0;

  const card = document.createElement('div');
  card.className = 'brief';
  card.style.animationDelay = (i * 0.04) + 's';
  card.innerHTML = `
    <div class="brief-num">Brief ${b.num}</div>
    <div class="brief-title">${b.title}</div>
    <div class="brief-hook">Hook: "${b.hook}"</div>
    <div class="brief-meta">
      <span class="tag tag-src">${b.src}</span>
      <span class="tag tag-vol">${b.vol}</span>
      <span class="tag tag-type">${b.type}</span>
      <span class="tag tag-ready">Ready</span>
    </div>

    <div class="brief-divider"></div>

    <div class="brief-actions">
      <button class="btn btn-preview" onclick="toggleMockup('${b.num}')">
        <span>&#x1F50D;</span> Preview Mockup
      </button>
      <button class="btn btn-payment ${hasLink ? 'has-link' : ''}" onclick="togglePayment('${b.num}')" id="pay-btn-${b.num}">
        <span>${hasLink ? '&#x2705;' : '&#x1F517;'}</span> ${hasLink ? 'Payment Link Added' : 'Add Payment Link'}
      </button>
    </div>

    <div class="mockup-panel" id="mockup-${b.num}">
      <div class="mockup-label">5-Slide Preview</div>
      <div class="mockup-slides">
        ${renderMockupSlides(b)}
      </div>
    </div>

    <div class="payment-panel" id="payment-${b.num}">
      ${hasLink ? `
        <div class="payment-saved" id="payment-saved-${b.num}">
          <span class="payment-saved-link">${savedLink}</span>
          <button class="payment-edit" onclick="editPayment('${b.num}')">Edit</button>
          <button class="payment-remove" onclick="removePayment('${b.num}')">Remove</button>
        </div>
        <div class="payment-input-row" id="payment-edit-${b.num}" style="display:none">
          <input class="payment-input" id="input-${b.num}" type="url" placeholder="Paste Stripe or payment link..." value="${savedLink}">
          <button class="payment-save" onclick="savePayment('${b.num}')">Save</button>
        </div>
      ` : `
        <div class="payment-input-row" id="payment-edit-${b.num}">
          <input class="payment-input" id="input-${b.num}" type="url" placeholder="Paste Stripe or payment link...">
          <button class="payment-save" onclick="savePayment('${b.num}')">Save</button>
        </div>
        <div class="payment-saved" id="payment-saved-${b.num}" style="display:none">
          <span class="payment-saved-link" id="link-display-${b.num}"></span>
          <button class="payment-edit" onclick="editPayment('${b.num}')">Edit</button>
          <button class="payment-remove" onclick="removePayment('${b.num}')">Remove</button>
        </div>
      `}
    </div>

    <button class="btn btn-run" onclick="runCarousel('${b.num}', \`${b.title.replace(/`/g, "'")}\`, \`${b.hook.replace(/`/g, "'")}\`)">
      &#x1F3AC; Run Carousel
    </button>
  `;
  grid.appendChild(card);
});

function toggleMockup(num) {
  const panel = document.getElementById('mockup-' + num);
  panel.classList.toggle('open');
}

function togglePayment(num) {
  const panel = document.getElementById('payment-' + num);
  panel.classList.toggle('open');
}

function savePayment(num) {
  const input = document.getElementById('input-' + num);
  const link = input.value.trim();
  if (!link) return;

  localStorage.setItem('payment_' + num, link);

  const savedDiv = document.getElementById('payment-saved-' + num);
  const editDiv = document.getElementById('payment-edit-' + num);
  const linkDisplay = savedDiv.querySelector('.payment-saved-link') || document.getElementById('link-display-' + num);
  linkDisplay.textContent = link;
  savedDiv.style.display = 'flex';
  editDiv.style.display = 'none';

  const btn = document.getElementById('pay-btn-' + num);
  btn.classList.add('has-link');
  btn.innerHTML = '<span>&#x2705;</span> Payment Link Added';

  showToast('Payment link saved for Brief ' + num);
}

function editPayment(num) {
  const savedDiv = document.getElementById('payment-saved-' + num);
  const editDiv = document.getElementById('payment-edit-' + num);
  savedDiv.style.display = 'none';
  editDiv.style.display = 'flex';
  document.getElementById('input-' + num).focus();
}

function removePayment(num) {
  localStorage.removeItem('payment_' + num);
  const savedDiv = document.getElementById('payment-saved-' + num);
  const editDiv = document.getElementById('payment-edit-' + num);
  const input = document.getElementById('input-' + num);
  savedDiv.style.display = 'none';
  editDiv.style.display = 'flex';
  input.value = '';

  const btn = document.getElementById('pay-btn-' + num);
  btn.classList.remove('has-link');
  btn.innerHTML = '<span>&#x1F517;</span> Add Payment Link';

  showToast('Payment link removed');
}

function runCarousel(num, title, hook) {
  const paymentLink = localStorage.getItem('payment_' + num) || '';
  const prompt = `Run the carousel for Brief ${num}: "${title}" \u2014 Hook: "${hook}"${paymentLink ? ' \u2014 Payment Link: ' + paymentLink : ''}`;

  navigator.clipboard.writeText(prompt).then(() => {
    showToast('Carousel brief copied \u2014 paste into Cowork to run');
  }).catch(() => {
    showToast('Brief ' + num + ' ready \u2014 copy the brief into Cowork to run');
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
